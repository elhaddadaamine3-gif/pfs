services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platform_backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_ADMIN_USERNAME: ${DJANGO_ADMIN_USERNAME:-admin}
      DJANGO_ADMIN_EMAIL: ${DJANGO_ADMIN_EMAIL:-admin@example.com}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD:-}
      DJANGO_ADMIN_MATRICULE: ${DJANGO_ADMIN_MATRICULE:-ADM-0001}
    volumes:
      - ./backend:/app
      - backend_poetry_cache:/root/.cache/pypoetry
    command: >
      sh -c "
      python -m poetry run python manage.py migrate &&
      python -m poetry run python manage.py runserver 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: platform_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  backend_poetry_cache:
  frontend_node_modules:
